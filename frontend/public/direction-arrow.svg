<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- Left chevron (blue) -->
  <polyline
    points="15,20 50,60 15,100"
    fill="none"
    stroke="black"
    stroke-width="22"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <polyline
    points="15,20 50,60 15,100"
    fill="none"
    stroke="#007BFF"
    stroke-width="16"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Right chevron (cyan) -->
  <polyline
    points="55,20 90,60 55,100"
    fill="none"
    stroke="black"
    stroke-width="22"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <polyline
    points="55,20 90,60 55,100"
    fill="none"
    stroke="#00E5FF"
    stroke-width="16"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
</svg>
